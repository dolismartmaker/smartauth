include:
  - remote: 'https://inligit.fr/cap-rel/gitlab-caprel-settings/-/raw/master/dolibarr-common.yml'

variables:
  DOLIBARR_VERSION_PHP73: "18"
  DOLIBARR_VERSION_PHP74: "18"
  DOLIBARR_VERSION_PHP80: "18"
  DOLIBARR_VERSION_PHP81: "18 19 20"
  DOLIBARR_VERSION_PHP82: "18 19 20 21"

stages:
  - prepare-php
  - prepare-dolibarr
  - phpstan

cache:
  paths:
    - .tmp/
    - vendor/

