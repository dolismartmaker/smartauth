include:
  - remote: 'https://inligit.fr/cap-rel/gitlab-caprel-settings/-/raw/master/dolibarr-common.yml'

variables:
  DOLIBARR_VERSION_PHP73: ""
  DOLIBARR_VERSION_PHP74: "18"
  DOLIBARR_VERSION_PHP80: "18"
  DOLIBARR_VERSION_PHP81: "18 19 20"
  DOLIBARR_VERSION_PHP82: "18 19 20 21 22 23"
  COMPOSER_HOME: "$CI_PROJECT_DIR/.composer"

stages:
  - prepare-php
  - prepare-dolibarr
  - phpstan
  - test

cache:
  paths:
    - .tmp/
    - vendor/
    - .composer/

# =============================================================================
# PHPUnit Tests
# =============================================================================

# Template for PHPUnit jobs
.phpunit_template: &phpunit_template
  tags:
    - php-82
  stage: test
  before_script:
    - make cleandevsqlite
    - composer install --prefer-dist --no-progress --no-interaction
  after_script:
    - make cleandevsqlite
  artifacts:
    when: always
    reports:
      junit: .phpunit.cache/test-results.xml
    expire_in: 1 week

# Unit tests on PHP 8.2
test:unit:php82:
  tags:
    - php-82
  <<: *phpunit_template
  script:
    - make cleandevsqlite
    - php vendor/bin/phpunit --testsuite unit --colors=never --log-junit .phpunit.cache/test-results.xml
  after_script:
    - make cleandevsqlite

# Integration tests with real Dolibarr (PHP 8.2+ required)
test:integration-dolibarr:php82:
  tags:
    - php-82
  <<: *phpunit_template
  stage: test
  rules:
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "merge_request_event"
  before_script:
    - composer require --dev cap-rel/dolibarr-integration-sqlite:18.0.x-dev --no-interaction
    - make cleandevsqlite
    - mkdir -p .phpunit.cache
  script:
    - php vendor/bin/phpunit -c phpunit-integration-dolibarr.xml --colors=never --log-junit .phpunit.cache/test-results.xml
  coverage: '/Total \| (\d+\.?\d*)%/'
  artifacts:
    when: always
    paths:
      - .phpunit.cache/
    reports:
      junit: .phpunit.cache/test-results.xml
    expire_in: 1 week
  allow_failure: true

# Coverage report job (only on default branch or merge requests)
test:integration-dolibarr:coverage:
  tags:
    - php-82
  stage: test
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  before_script:
    - php -m | grep pcov
    - composer require --dev cap-rel/dolibarr-integration-sqlite:18.0.x-dev --no-interaction
    - make cleandevsqlite
    - mkdir -p .phpunit.cache
  script:
    - php -d pcov.enabled=1 -d pcov.directory="$CI_PROJECT_DIR" vendor/bin/phpunit -c phpunit-integration-dolibarr.xml --coverage-text --coverage-cobertura=.phpunit.cache/coverage.xml --log-junit .phpunit.cache/test-results.xml 2>&1 | tee .phpunit.cache/coverage-output.txt
    - COVERAGE=$(grep -oP 'Lines:\s+\K[\d.]+' .phpunit.cache/coverage-output.txt | head -1 || echo "0")
    - echo "Total | ${COVERAGE}%"
  coverage: '/Total \| (\d+\.?\d*)%/'
  after_script:
    - make cleandevsqlite
  artifacts:
    when: always
    paths:
      - .phpunit.cache/
    reports:
      junit: .phpunit.cache/test-results.xml
      coverage_report:
        coverage_format: cobertura
        path: .phpunit.cache/coverage.xml
    expire_in: 1 week
  allow_failure: true

# PHP syntax check
test:lint:
  tags:
    - php-82
  stage: test
  script:
    - find api/ class/ dolMapping/ -name "*.php" -exec php -l {} \;
  allow_failure: false

